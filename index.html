<!DOCTYPE HTML>
<html>
 <head>
  <title>SONGYI DESIGN</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

  <style>
    /* 1. 타이포그래피 위계 (PROJECT & AWARD 동일하게) */
    #project-section .major h2,
    #award-section .major h2 {
        font-size: 2.5rem !important; 
        letter-spacing: 0.3rem !important; 
        font-weight: 900 !important;
        margin-bottom: 4rem !important;
        border: none !important;
        text-transform: uppercase;
    }

    #project-section .project-grid article h2 {
        font-size: 1.2rem !important; 
        letter-spacing: 0.15rem !important;
        font-weight: 700 !important;
        color: #212931 !important;
        margin-top: 1rem !important;
    }

    #project-section .project-grid article p {
        font-size: 0.85rem !important;
        color: #666 !important;
        line-height: 1.8 !important;
        margin-bottom: 2.5rem !important;
    }

    /* 2. 프로젝트 섹션 3단 고정 */
    @media screen and (min-width: 981px) {
      #project-section .project-grid {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important;
        justify-content: space-between !important;
        align-items: stretch !important;
        width: 100% !important;
        margin: 2rem 0 !important;
        border-top: none !important;
      }

      #project-section .project-grid article {
        flex: 1 !important;
        padding: 4rem 2rem !important;
        border-left: 1px solid #e5e5e5 !important;
        text-align: center !important;
        box-sizing: border-box !important;
      }

      #project-section .project-grid article:first-child {
        border-left: none !important;
      }
    }

    /* 3. 잔선 제거 */
    #project-section .project-grid article header.major:after,
    #project-section .project-grid article header.major:before,
    #award-section .major:after,
    #award-section .major:before {
        display: none !important;
        content: none !important;
    }

    /* 4. AWARD 테이블 디자인 */
    #award-section table {
        width: 100% !important;
        max-width: 1000px !important;
        margin: 0 auto 5rem auto !important;
        border-collapse: collapse !important;
    }
    #award-section table td {
        padding: 1.5rem !important;
        border-bottom: 1px solid #eeeeee !important;
        font-size: 0.9rem !important;
    }

    /* 5. [중요] 푸터 회색 바탕 제거 및 투명화 */
    #footer {
        background-color: transparent !important; /* 회색 바탕 제거 */
        background: none !important;
        border-top: 1px solid #eeeeee !important;
        padding: 2rem 0 !important;
        margin: 0 !important;
        display: block !important;
    }

    #copyright {
        background-color: transparent !important;
        color: #999 !important;
        padding: 2rem 0 !important;
        font-size: 0.7rem !important;
    }

    header.major { border-bottom: none !important; margin-bottom: 2rem !important; }
  </style>
 </head>
