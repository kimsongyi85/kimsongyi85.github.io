<!DOCTYPE HTML>
<html>
<head>
    <title>Web & Mobile - Songyi Design</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
        /* 프로젝트 그리드: 1단 구성 */
        .project-grid {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 7rem; 
            margin-top: 4rem;
        }
        .project-item {
            text-align: center;
            padding-bottom: 5rem;
            border-bottom: 1px solid #f4f4f4;
        }
        .image-container {
            position: relative;
            display: block;
            overflow: hidden;
            background: #000;
            margin-bottom: 2.5rem;
        }
        .project-item img {
            width: 100%;
            height: auto;
            max-height: 750px;
            object-fit: cover;
            display: block;
            filter: grayscale(10%);
            transition: all 0.5s ease;
        }
        .hover-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.3rem;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 2;
            text-transform: uppercase;
        }
        .image-container:hover img {
            filter: grayscale(0%) opacity(0.5);
            transform: scale(1.02);
        }
        .image-container:hover .hover-text {
            opacity: 1;
        }
        .project-category {
            font-size: 0.8rem;
            letter-spacing: 0.15rem;
            color: #bbb;
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.5rem;
        }
        .project-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: #222;
        }
/* 설명 문구 수정: 왼쪽 정렬 및 폭 확장 */
.project-desc {
    font-size: 0.95rem;      /* 글씨 크기를 아주 살짝 줄여서 더 세련되게 */
    line-height: 2.2;        /* 줄 간격을 더 넓혀서 전시 글 느낌 강조 */
    color: #777;
    max-width: 420px;        /* 이 수치가 핵심입니다. 420px 이하가 좋아요 */
    margin: 4.5rem auto 0 auto; /* 위쪽 여백을 넉넉히 줘서 이미지와 분리 */
    text-align: center;
    word-break: keep-all; 
    font-weight: 300;        /* 얇은 폰트로 감성 무드 추가 */
    letter-spacing: -0.02em; /* 자간을 살짝 조여서 가독성 확보 */
}

/* 모바일에서는 화면을 꽉 채우도록 유지 */
@media screen and (max-width: 736px) {
    .project-desc {
        max-width: 90%;
        margin-top: 2rem;
    }
}
    </style>
</head>

            </header>
            <section class="project-grid">
                <article class="project-item">
                    <span class="project-category">Brand Campagin </span>
                    <h3 class="project-title">Digital Archive Project</h3>
                    
                    <a href="./web/pf_event.html" target="_blank" class="image-container">

                    </p>
