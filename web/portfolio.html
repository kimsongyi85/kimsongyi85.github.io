    /* 필터 버튼 영역 최적화 */
    .filter-wrapper {
      padding: 30px 10px;
      text-align: center;
    }
    .filter-button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .btn-filter {
      display: inline-block;
      padding: 12px 18px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      background: transparent;
      color: #fff !important;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
      text-decoration: none !important;
    }
    .btn-filter.active {
      background: #ffbd39 !important;
      color: #000 !important;
      border-color: #ffbd39 !important;
    }

    /* 이미지 및 텍스트 스타일 보정 */
    .blog-entry {
      width: 100%;
      margin-bottom: 30px;
    }
    .block-20 {
      display: block;
      width: 100%;
      height: 250px; /* 이미지 높이 고정 */
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center center;
      border-radius: 10px;
    }
    .heading a {
      color: #fff;
      font-size: 18px;
    }
