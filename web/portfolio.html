  <link rel="stylesheet" href="css/style.css">

  <style>
    /* 1. PC/모바일 공통 버튼 스타일 (스타일 고정) */
    .filter-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 50px;
    }

    .pf-btn {
      display: inline-block;
      padding: 12px 25px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      background: transparent;
      color: #ffffff !important;
      font-size: 14px;
      font-weight: 400;
      transition: all 0.3s ease;
      text-decoration: none !important;
    }

    .pf-btn.active, .pf-btn:hover {
      background: #ffbd39 !important;
      color: #000000 !important;
      border-color: #ffbd39 !important;
    }

    /* 2. 모바일에서 버튼 크기 및 배치 강제 고정 */
    @media (max-width: 768px) {
      .filter-group {
        gap: 8px;
        padding: 0 15px;
      }
      .pf-btn {
        flex: 1 1 calc(45% - 10px); /* 모바일에서 2개씩 꽉 차게 */
        padding: 14px 5px;
        font-size: 12px;
        text-align: center;
      }
    }

    /* 3. PC에서 내용이 안 보일 때 대비 (상단 여백) */
    #blog-section {
      padding-top: 120px; /* 네비게이션 바 높이만큼 여백 확보 */
    }
  </style>
</head>
