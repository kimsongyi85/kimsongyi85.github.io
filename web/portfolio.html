      background-repeat: no-repeat;

      border-radius: 8px;

    @media (max-width: 768px) {
      .btn-custom-filter {
        flex: 1 1 calc(45% - 10px); /* 버튼을 2개씩 큼직하게 배치 */

      }
      .block-20 {
