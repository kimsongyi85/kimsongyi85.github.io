<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Songyi Design</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  
  <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" rel="stylesheet">
  <link rel="stylesheet" href="css/open-iconic-bootstrap.min.css">
  <link rel="stylesheet" href="css/animate.css">
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <link rel="stylesheet" href="css/owl.theme.default.min.css">
  <link rel="stylesheet" href="css/magnific-popup.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/ionicons.min.css">
  <link rel="stylesheet" href="css/flaticon.css">
  <link rel="stylesheet" href="css/icomoon.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    html { scroll-behavior: smooth; }
    section.ftco-section { padding: 7em 0 !important; }
    .ftco-about { padding-top: 7em !important; padding-bottom: 5em !important; }
    
    /* Skills 섹션 상단 공백 제거 */
    #skills-section { padding-top: 0 !important; }

    .heading-section h1.big { font-size: 6rem !important; opacity: 0.05 !important; }
    .heading-section h2 { margin-bottom: 25px !important; }
    
    .scroll-anchor { display: block; position: relative; top: -110px; visibility: hidden; }
    #projects-section, #services-section { top: -110px !important; }

    @media (max-width: 767px) {
      section.ftco-section { padding: 5em 0 !important; }
      .ftco-about { padding-top: 5em !important; }
      .hero .slider-item:first-child .one-third.img { display: none !important; }
      .ftco-about .img-about { display: none !important; }
      .hero .slider-item:not(:first-child) .one-third.img { display: block !important; height: 320px !important; background-size: cover !important; background-position: center top !important; }
      .hero .one-forth { padding: 40px 20px !important; width: 100% !important; }
      .hero .slider-text { height: auto !important; min-height: 500px !important; }
      .scroll-anchor { top: -90px; }
      #projects-section { top: -90px !important; }
      .heading-section h1.big { font-size: 4rem !important; }
    }
  </style>
</head>
<body data-spy="scroll" data-target=".site-navbar-target" data-offset="150">
  
  <nav class="navbar navbar-expand-lg navbar-dark ftco_navbar ftco-navbar-light site-navbar-target" id="ftco-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html" style="text-transform: none !important;">Songyi</a>
      <button class="navbar-toggler js-fh5co-nav-toggle fh5co-nav-toggle" type="button" data-toggle="collapse" data-target="#ftco-nav" aria-controls="ftco-nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="oi oi-menu"></span> 
      </button>

      <div class="collapse navbar-collapse" id="ftco-nav">
        <ul class="navbar-nav nav ml-auto">
          <li class="nav-item"><a href="#home-section" class="nav-link"><span>Home</span></a></li>
          <li class="nav-item"><a href="#about-section" class="nav-link"><span>About</span></a></li>
          <li class="nav-item"><a href="#resume-section" class="nav-link"><span>Award</span></a></li>
          <li class="nav-item"><a href="#services-section" class="nav-link"><span>Skill&Tools</span></a></li>
          <li class="nav-item"><a href="#projects-section" class="nav-link"><span>Projects</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- [생략: home-section, about-section, resume-section, services-section 콘텐츠 유지] -->

  <!-- [Skills 섹션] 상단 패딩 제거 완료 -->
  <section class="ftco-section" id="skills-section">
    <div class="container">
      <div class="row">
        <div class="col-md-6 animate-box">
          <div class="progress-wrap ftco-animate">
            <h3>Photoshop</h3>
            <div class="progress">
              <div class="progress-bar color-1" style="width:100%"><span>100%</span></div>
            </div>
          </div>
        </div>
        <!-- ... 나머지 스킬 항목들 ... -->
      </div>
    </div>
  </section>

  <!-- [Project 섹션] 태그 구조 수정 완료 -->
  <span id="projects-section" class="scroll-anchor"></span>
  <section class="ftco-section ftco-project" id="projects-section-real">
    <div class="container">
      <div class="row justify-content-center pb-5">
        <div class="col-md-12 heading-section text-center ftco-animate">
          <h1 class="big big-2">Project</h1>
          <h2 class="mb-4">Project</h2>
          <p class="categories">다년간의 경험으로 제작된 소중한 작업물을 소개합니다.</p>
        </div>
      </div>
      <div class="row">
        <!-- 프로젝트 항목들 -->
      </div>
    </div>
  </section>

  <!-- [생략: footer 및 script 하단부] -->

</body>
</html>
