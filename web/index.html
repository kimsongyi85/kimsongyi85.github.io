<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Songyi Design</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  
  <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" rel="stylesheet">
  <link rel="stylesheet" href="css/open-iconic-bootstrap.min.css">
  <link rel="stylesheet" href="css/animate.css">
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <link rel="stylesheet" href="css/owl.theme.default.min.css">
  <link rel="stylesheet" href="css/magnific-popup.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/ionicons.min.css">
  <link rel="stylesheet" href="css/flaticon.css">
  <link rel="stylesheet" href="css/icomoon.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    html { scroll-behavior: smooth; }
    .scroll-anchor { display: block; position: relative; top: -110px; visibility: hidden; }
    
    /* 툴 섹션 간격 조정 */
    .tools-merged-container { margin-top: 50px; padding-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
    
    @media (max-width: 767px) {
      .scroll-anchor { top: -80px; }
      .tools-merged-container { margin-top: 30px; }
    }
  </style>
</head>
<body data-spy="scroll" data-target=".site-navbar-target" data-offset="150">
  
  <nav class="navbar navbar-expand-lg navbar-dark ftco_navbar ftco-navbar-light site-navbar-target" id="ftco-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Songyi</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#ftco-nav">
        <span class="oi oi-menu"></span> 
      </button>

      <div class="collapse navbar-collapse" id="ftco-nav">
        <ul class="navbar-nav nav ml-auto">
          <li class="nav-item"><a href="#home-section" class="nav-link"><span>Home</span></a></li>
          <li class="nav-item"><a href="#about-section" class="nav-link"><span>About</span></a></li>
          <li class="nav-item"><a href="#resume-section" class="nav-link"><span>Award</span></a></li>
          <li class="nav-item"><a href="#services-section" class="nav-link"><span>Skill&Tools</span></a></li>
          <li class="nav-item"><a href="#projects-section" class="nav-link"><span>Projects</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 생략 (Home, About, Award 등 기존 섹션 동일) -->

  <!-- 수정된 Skill&Tools 섹션 -->
  <span id="services-section" class="scroll-anchor"></span>
  <section class="ftco-section" id="services-section-real">
    <div class="container">
      <div class="row justify-content-center py-5 mt-5">
        <div class="col-md-12 heading-section text-center ftco-animate">
          <h1 class="big big-2">Skills</h1>
          <h2 class="mb-4">Skill & Tools</h2>
          <p class="categories">웹을 주축으로 한 포트폴리오로 구성되었습니다.</p>
        </div>
      </div>
      
      <div class="row">
        <div class="col-md-3 text-center d-flex ftco-animate"><a href="portfolio.html" class="services-1"><span class="icon"><i class="flaticon-web-design"></i></span><div class="desc"><h3 class="mb-5">Web Design</h3></div></a></div>
        <div class="col-md-3 text-center d-flex ftco-animate"><a href="pf_webdesign.html" class="services-1"><span class="icon"><i class="flaticon-ux-design"></i></span><div class="desc"><h3 class="mb-5">UI/UX Design</h3></div></a></div>
        <div class="col-md-3 text-center d-flex ftco-animate"><a href="pf_event.html" class="services-1"><span class="icon"><i class="flaticon-ideas"></i></span><div class="desc"><h3 class="mb-5">Event/Popup Design</h3></div></a></div>
        <div class="col-md-3 text-center d-flex ftco-animate"><a href="pf_visualdesign.html" class="services-1"><span class="icon"><i class="flaticon-innovation"></i></span><div class="desc"><h3 class="mb-5">Visual Design</h3></div></a></div>
      </div>

      <div class="row tools-merged-container">
        <div class="col-md-6 animate-box"><div class="progress-wrap ftco-animate"><h3>Photoshop</h3><div class="progress"><div class="progress-bar color-1" style="width:100%"><span>100%</span></div></div></div></div>
        <div class="col-md-6 animate-box"><div class="progress-wrap ftco-animate"><h3>Illustration</h3><div class="progress"><div class="progress-bar color-2" style="width:90%"><span>90%</span></div></div></div></div>
        <div class="col-md-6 animate-box"><div class="progress-wrap ftco-animate"><h3>Figma</h3><div class="progress"><div class="progress-bar color-3" style="width:90%"><span>90%</span></div></div></div></div>
        <div class="col-md-6 animate-box"><div class="progress-wrap ftco-animate"><h3>Adobe XD</h3><div class="progress"><div class="progress-bar color-4" style="width:85%"><span>85%</span></div></div></div></div>
        <div class="col-md-6 animate-box"><div class="progress-wrap ftco-animate"><h3>Sktech</h3><div class="progress"><div class="progress-bar color-5" style="width:85%"><span>85%</span></div></div></div></div>
        <div class="col-md-6 animate-box"><div class="progress-wrap ftco-animate"><h3>Chat GPT</h3><div class="progress"><div class="progress-bar color-6" style="width:90%"><span>90%</span></div></div></div></div>
      </div>
    </div>
  </section>

  <!-- Projects 등 나머지 부분 동일 -->

  <script src="js/jquery.min.js"></script>
  <script>
    document.querySelectorAll('.navbar-nav a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        const targetElement = document.querySelector(targetId);
        
        // 💡 오프셋 값을 더 작게(음수 방향으로 크게) 조정하여 더 위로 올라가게 함
        const offset = (targetId === '#services-section') ? 30 : 80; 
        
        window.scrollTo({
          top: targetElement.offsetTop - offset,
          behavior: 'smooth'
        });
      });
    });
  </script>
</body>
</html>
