<!DOCTYPE HTML>
<html>
<head>
    <title>Project Detail - SONGYI DESIGN</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    
    <style>
        /* 상세페이지 기본 레이아웃 */
        #main > .project-header { 
            text-align: center; 
            padding: 4rem 0; 
            border-bottom: 1px solid #eee; 
        }
        
        .project-header p {
            text-align: center !important;
            margin: 0 auto !important;
            width: 100%;
            display: block;
        }

        .project-info-grid { 
            display: flex; 
            justify-content: space-between;
            gap: 3rem; 
            margin: 4rem 0; 
            text-align: left; 
        }

        .project-info-grid > div:first-child { flex: 1; }
        .project-info-grid > div:last-child { flex: 2; }

        .info-label { 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #333; 
            display: block; 
            margin-bottom: 0.5rem; 
        }

        .project-content img { 
            width: 100%; 
            margin-bottom: 2rem; 
            display: block; 
            min-height: 200px; 
            background: #f9f9f9; 
        }

        .color-palette { display: flex; gap: 1rem; margin-top: 1rem; }
        .color-circle { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #eee; }

        /* 하단 푸터 버튼 스타일 수정 */
        .project-footer {
            display: flex;
            justify-content: center; /* 버튼들을 가운데로 모음 */
            gap: 20px;               /* 버튼 사이 간격 */
            margin-top: 5rem;
            padding-top: 3rem;
            border-top: 1px solid #eee;
        }

        .project-footer .button.small {
            min-width: 180px;        /* 모든 버튼의 최소 길이를 똑같이 통일 */
            height: 50px;
            line-height: 46px;
            text-align: center;
            letter-spacing: 0.1rem;
            font-weight: 700;
            padding: 0 20px;
            border: 2px solid #222 !important; 
            color: #222 !important;
            background: transparent !important;
            transition: all 0.3s ease;
        }

        .project-footer .button.small:hover {
            background-color: #222 !important;
            color: #fff !important;
        }

        @media screen and (max-width: 736px) { 
            .project-info-grid { flex-direction: column; } 
            .project-footer { flex-direction: column; align-items: center; }
            .project-footer .button.small { width: 100%; }
        }
    </style> 
</head>
<body class="is-preload">

    <div id="wrapper">
        <header id="header">
            <a href="index.html" class="logo">SONGYI</a>
        </header>

        <nav id="nav">
            <ul class="links">
                <li><a href="index.html">HOME</a></li>
                <li class="active"><a href="javascript:history.back();">Branding</a></li>
                <li><a href="index.html#webdesign">WEB/MOBILE</a></li>
                <li><a href="index.html#campaign">CAMPAIGN</a></li>
            </ul>
        </nav>

        <div id="main">
            <section class="project-header">
                <span id="project-date" class="date">Design Project / 2026</span>
                <h1 id="project-title" style="font-size: 3rem; margin: 1rem 0;">Loading...</h1>
                <p id="project-sub">Sub-title Loading...</p>
            </section>

            <section class="project-info-grid">
                <div>
                    <div style="margin-bottom: 2rem;">
                        <span class="info-label">Role</span>
                        <p id="project-role">-</p>
                    </div>
                    <div>
                        <span class="info-label">Colors</span>
                        <div id="project-colors" class="color-palette"></div>
                    </div>
                </div>
                <div>
                    <span class="info-label">Concept</span>
                    <p id="project-concept" style="font-size: 1.1rem; line-height: 1.8;">
                        데이터를 불러오는 중입니다...
                    </p>
                </div>
            </section>

            <section id="project-images" class="project-content"></section>

            <footer class="project-footer">
                <a href="#" class="button small">← PREVIOUS</a>
                <a href="javascript:history.back();" class="button small">BACK TO LIST</a>
                <a href="#" class="button small">NEXT →</a>
            </footer>
        </div>

        <div id="copyright">
            <ul><li>&copy; SONGYI DESIGN</li></ul>
        </div>
    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/jquery.scrolly.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
        const PROJECT_DATA = {
            "work01": {
                title: "ROAST ARCHIVE",
                date: "Design Project / 2026",
                sub: "Specialty Coffee Brand Identity",
                role: "Brand Identity, Package Design",
                concept: "'기록'이라는 키워드를 중심으로 스페셜티 커피의 본질을 시각화했습니다. 그리드 시스템과 타이포그래피 중심의 미니멀한 디자인을 적용했습니다.",
                colors: ["#1a1a1a", "#d4a373", "#fefae0"],
                images: ["images/b_roast01.webp", "images/b_roast02.webp"]
            },
            "work02": {
                title: "MAYFIELD: THE VOID",
                date: "Design Project / 2026",
                sub: "Hotel Rebranding Project",
                role: "Brand Identity, Amenity Design",
                concept: "'비움'의 가치를 담은 초미니멀리즘 디자인입니다. 불필요한 장식을 배제하고 공간의 여백을 시각적 언어로 표현했습니다.",
                colors: ["#333333", "#eeeeee", "#ffffff"],
                images: ["images/m_b_mayfiled01.webp"]
            },
            "work03": {
                title: "ON AIR WINE LAB",
                date: "Design Project / 2026",
                sub: "Wine & Life Branding",
                role: "Visual Identity, Digital Design",
                concept: "와인이 선사하는 특별한 순간을 기록하는 아카이브 컨셉입니다. 직관적인 레이아웃을 통해 브랜드의 전문성을 강조했습니다.",
                colors: ["#5c1a1a", "#f4f4f4", "#222222"],
                images: ["images/m_b_onair01.webp"]
            },
            "work04": {
                title: "NUVOLA PERFUME",
                date: "Design Project / 2026",
                sub: "Fragrance Brand Branding",
                role: "Brand Concept, Package Design",
                concept: "'구름'의 부드러움을 모티브로 한 향수 브랜드입니다. 몽환적이고 감성적인 비주얼로 향기의 촉각적 경험을 제안합니다.",
                colors: ["#a2d2ff", "#ffffff", "#e0e0e0"],
                images: ["images/m_b_nuvola01.webp"]
            }
            // work05, work06 생략 (필요시 동일 구조로 추가)
        };

        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id') || 'work01'; 
            const data = PROJECT_DATA[projectId];

            if (data) {
                document.getElementById('project-title').innerText = data.title;
                document.getElementById('project-date').innerText = data.date;
                document.getElementById('project-sub').innerText = data.sub;
                document.getElementById('project-role').innerText = data.role;
                document.getElementById('project-concept').innerText = data.concept;

                const colorBox = document.getElementById('project-colors');
                colorBox.innerHTML = '';
                data.colors.forEach(color => {
                    const div = document.createElement('div');
                    div.className = 'color-circle';
                    div.style.backgroundColor = color;
                    colorBox.appendChild(div);
                });

                const imageBox = document.getElementById('project-images');
                imageBox.innerHTML = '';
                data.images.forEach(imgSrc => {
                    const img = document.createElement('img');
                    img.src = imgSrc;
                    img.alt = data.title;
                    imageBox.appendChild(img);
                });

                document.title = data.title + " - SONGYI DESIGN";
                
                // 이전/다음 버튼 링크 설정 로직 추가
                const currentNum = parseInt(projectId.replace('work', ''));
                const prevBtn = document.querySelector('.project-footer .button:first-child');
                const nextBtn = document.querySelector('.project-footer .button:last-child');

                if (currentNum > 1) {
                    prevBtn.href = `project-detail.html?id=work${String(currentNum - 1).padStart(2, '0')}`;
                } else {
                    prevBtn.style.visibility = 'hidden'; 
                }

                if (currentNum < Object.keys(PROJECT_DATA).length) {
                    nextBtn.href = `project-detail.html?id=work${String(currentNum + 1).padStart(2, '0')}`;
                } else {
                    nextBtn.style.visibility = 'hidden';
                }

                setTimeout(() => {
                    document.body.classList.remove('is-preload');
                }, 100);
            } else {
                document.getElementById('project-title').innerText = "Project Not Found";
                document.body.classList.remove('is-preload');
            }
        });
    </script>
</body>
</html>
