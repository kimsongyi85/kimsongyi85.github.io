<!DOCTYPE HTML>
<html>
<head>
    <title>Project Detail - SONGYI DESIGN</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    
    <style>
        /* 상세페이지 기본 레이아웃 */
        #main > .project-header { 
            text-align: center; 
            padding: 4rem 0; 
            border-bottom: 1px solid #eee; 
        }
        
        .project-header p {
            text-align: center !important;
            margin: 0 auto !important;
            width: 100%;
            display: block;
        }

        .project-info-grid { 
            display: grid; 
            grid-template-columns: 1fr 2fr;
            gap: 3rem; 
            margin: 4rem 0; 
            text-align: left; 
        }

        .info-label { 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #333; 
            display: block; 
            margin-bottom: 0.5rem; 
        }

        .project-content img { 
            width: 100%; 
            margin-bottom: 2rem; 
            display: block; 
            min-height: 200px; 
            background: #f9f9f9; 
        }

        /* [추가] 세로가 긴 이미지를 위한 스타일 */
        .project-content img.long-image {
            height: auto !important;
            max-height: none !important;
            object-fit: contain;
        }

        .color-palette { display: flex; gap: 1rem; margin-top: 1rem; }
        .color-circle { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #eee; }

        /* 하단 푸터 버튼 스타일 */
        .project-footer {
            display: flex;
            justify-content: center; 
            gap: 15px; 
            margin-top: 5rem;
            padding: 3rem 10px 0 10px;
            border-top: 1px solid #eee;
        }

        .project-footer .button.small {
            flex: 1;                
            max-width: 180px;       
            height: 48px;
            line-height: 46px;      
            text-align: center;
            letter-spacing: 0.05rem;
            font-weight: 500;       
            font-size: 0.8rem;
            padding: 0 5px;
            border: 1px solid #000000 !important; 
            color: #000000 !important;            
            background-color: transparent !important;
            transition: all 0.3s ease;
            display: inline-block;
            white-space: nowrap; 
            -webkit-appearance: none;
            border-radius: 0;         
        }

        .project-footer .button.small:not(.disabled):hover {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        .project-footer .button.disabled {
            border: 1px solid #000000 !important; 
            color: #000000 !important;
            cursor: default;                 
            pointer-events: none;            
            opacity: 1 !important;           
            background-color: transparent !important;
        }

        @media screen and (max-width: 736px) {
            .project-info-grid { grid-template-columns: 1fr; } 
            .project-footer { gap: 6px; }
            .project-footer .button.small {
                font-size: 0.65rem;  
                letter-spacing: -0.02rem;
                height: 42px;
                line-height: 40px;
            }
        }
    </style> 
</head>
<body class="is-preload">

    <div id="wrapper">
        <header id="header">
            <a href="index.html" class="logo">SONGYI</a>
        </header>

        <nav id="nav">
            <ul class="links">
                <li><a href="index.html">HOME</a></li>
                <li class="active"><a href="javascript:history.back();">Branding</a></li>
                <li><a href="index.html#webdesign">WEB/MOBILE</a></li>
                <li><a href="index.html#campaign">CAMPAIGN</a></li>
            </ul>
        </nav>

        <div id="main">
            <section class="project-header">
                <span id="project-date" class="date">Design Project / 2026</span>
                <h1 id="project-title" style="font-size: 3rem; margin: 1rem 0;">Loading...</h1>
                <p id="project-sub">Sub-title Loading...</p>
            </section>

            <section class="project-info-grid">
                <div>
                    <div style="margin-bottom: 2rem;">
                        <span class="info-label">Role</span>
                        <p id="project-role">-</p>
                    </div>
                    <div>
                        <span class="info-label">Colors</span>
                        <div id="project-colors" class="color-palette"></div>
                    </div>
                </div>
                <div>
                    <span class="info-label">Concept</span>
                    <p id="project-concept" style="font-size: 1.1rem; line-height: 1.8;">
                        데이터를 불러오는 중입니다...
                    </p>
                </div>
            </section>

            <section id="project-images" class="project-content"></section>

            <footer class="project-footer">
                <a href="#" id="prev-btn" class="button small">← PREV</a> 
                <a href="javascript:history.back();" class="button small">LIST</a>
                <a href="#" id="next-btn" class="button small">NEXT →</a>
            </footer>
        </div>

        <div id="copyright">
            <ul><li>&copy; SONGYI DESIGN</li></ul>
        </div>
    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/jquery.scrolly.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
        const PROJECT_DATA = {
            "work01": {
                title: "ROAST ARCHIVE",
                date: "Design Project / 2026",
                sub: "Specialty Coffee Brand Identity",
                role: "Brand Identity, Package Design",
                concept: "스페셜티 커피 브랜드의 로고 및 패키지 시스템을 구축했습니다 원두의 산미와 바디감을 직관적인 그래픽 레이아웃으로 표현했습니다",
                colors: ["#1a1a1a", "#d4a373", "#fefae0"],
                images: ["images/b_roast01.webp", "images/b_roast02.webp", "images/b_roast03.webp", "images/b_roast04_long.webp", "images/b_roast05.webp"
                        , "images/b_roast06.webp", "images/b_roast07.webp", "images/b_roast08.webp", "images/b_roast09.webp", "images/b_roast10.webp", "images/b_roast11.webp"
                        , "images/b_roast12.webp", "images/b_roast13.webp", "images/b_roast14.webp", "images/b_roast15.webp", "images/b_roast16.webp", "images/b_roast17.webp"]
            },
            "work02": {
                title: "MAYFIELD: THE VOID",
                date: "Design Project / 2026",
                sub: "Hotel Rebranding Project",
                role: "Brand Identity, Amenity Design",
                concept: "메이필드 호텔의 가치를 새롭게 정의한 리브랜딩 프로젝트입니다 기하학적 도형을 활용하여 미니멀한 어메니티와 룸카드를 디자인했습니다",
                colors: ["#333333", "#eeeeee", "#ffffff"],
                images: [
                    "images/m_b_mayfield00_long.webp", // 파일명에 long이 들어가면 길게 보입니다.
                    "images/m_b_mayfield01.webp"
                ]
            },
            "work03": {
                title: "ON AIR WINE LAB",
                date: "Design Project / 2026",
                sub: "Wine & Life Branding",
                role: "Visual Identity, Digital Design",
                concept: "와인 라벨링과 브랜드의 전문성을 담은 디지털 페이지를 제작했습니다 와인이 선사하는 특별한 순간을 기록하는 아카이브 컨셉을 적용했습니다",
                colors: ["#5c1a1a", "#f4f4f4", "#222222"],
                images: ["images/m_b_onair01.webp"]
            },
            "work04": {
                title: "NUVOLA PERFUME",
                date: "Design Project / 2026",
                sub: "Fragrance Brand Branding",
                role: "Brand Concept, Package Design",
                concept: "구름의 부드러움을 모티브로 진행한 향수 브랜드 브랜딩입니다 몽환적이고 감성적인 비주얼을 통해 브랜드의 촉각적 경험을 강조했습니다",
                colors: ["#a2d2ff", "#ffffff", "#e0e0e0"],
                images: ["images/m_b_nuvola01.webp"]
            }
        };

        function loadProjectDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            let projectId = urlParams.get('id');
            
            if (!projectId || !PROJECT_DATA[projectId]) {
                projectId = 'work01';
            }

            const data = PROJECT_DATA[projectId];

            if (data) {
                document.getElementById('project-title').innerText = data.title;
                document.getElementById('project-date').innerText = data.date;
                document.getElementById('project-sub').innerText = data.sub;
                document.getElementById('project-role').innerText = data.role;
                document.getElementById('project-concept').innerText = data.concept;

                const colorBox = document.getElementById('project-colors');
                colorBox.innerHTML = '';
                data.colors.forEach(color => {
                    const div = document.createElement('div');
                    div.className = 'color-circle';
                    div.style.backgroundColor = color;
                    colorBox.appendChild(div);
                });

                // [수정된 이미지 생성 로직]
                const imageBox = document.getElementById('project-images');
                imageBox.innerHTML = '';
                data.images.forEach(imgSrc => {
                    const img = document.createElement('img');
                    img.src = imgSrc;
                    img.alt = data.title;
                    
                    // 파일명에 'long'이 있으면 클래스 추가
                    if (imgSrc.toLowerCase().includes('long')) {
                        img.classList.add('long-image');
                    }
                    
                    imageBox.appendChild(img);
                });

                document.title = data.title + " - SONGYI DESIGN";
                
                const currentNum = parseInt(projectId.replace('work', ''));
                const totalProjects = Object.keys(PROJECT_DATA).length;
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');

                if (currentNum > 1) {
                    prevBtn.href = `project-detail.html?id=work${String(currentNum - 1).padStart(2, '0')}`;
                    prevBtn.classList.remove('disabled');
                } else {
                    prevBtn.classList.add('disabled');
                }

                if (currentNum < totalProjects) {
                    nextBtn.href = `project-detail.html?id=work${String(currentNum + 1).padStart(2, '0')}`;
                    nextBtn.classList.remove('disabled');
                } else {
                    nextBtn.classList.add('disabled');
                }

                document.body.classList.remove('is-preload');
            }
        }

        document.addEventListener('DOMContentLoaded', loadProjectDetail);
    </script>
</body>
</html>
