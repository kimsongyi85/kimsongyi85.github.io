<!DOCTYPE HTML>
<html>
<head>
    <title>Project Detail - SONGYI DESIGN</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    
    <style>
        /* 상세페이지 기본 레이아웃 */
        #main > .project-header { 
            text-align: center; 
            padding: 4rem 0; 
            border-bottom: 1px solid #eee; 
        }
        
        .project-header p {
            text-align: center !important;
            margin: 0 auto !important;
            width: 100%;
            display: block;
        }

        .project-info-grid { 
            display: grid; 
            grid-template-columns: 1fr 2fr;
            gap: 3rem; 
            margin: 4rem 0; 
            text-align: left; 
        }

        .info-label { 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #333; 
            display: block; 
            margin-bottom: 0.5rem; 
        }

        .project-content img { 
            width: 100%; 
            margin-bottom: 2rem; 
            display: block; 
            min-height: 200px; 
            background: #f9f9f9; 
        }

        .color-palette { display: flex; gap: 1rem; margin-top: 1rem; }
        .color-circle { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #eee; }

        /* 하단 푸터 버튼 스타일 - 1px 슬림 블랙 버전 */
        .project-footer {
            display: flex;
            justify-content: center; 
            gap: 15px; 
            margin-top: 5rem;
            padding: 3rem 10px 0 10px;
            border-top: 1px solid #eee;
        }

        .project-footer .button.small {
            flex: 1;                
            max-width: 180px;       
            height: 48px;
            line-height: 46px;      
            text-align: center;
            letter-spacing: 0.05rem;
            font-weight: 500;       
            font-size: 0.8rem;
            padding: 0 5px;
            border: 1px solid #000000 !important; 
            color: #000000 !important;            
            background-color: transparent !important;
            transition: all 0.3s ease;
            display: inline-block;
            white-space: nowrap; 
            -webkit-appearance: none;
            border-radius: 0;         
        }

        .project-footer .button.small:not(.disabled):hover {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        .project-footer .button.disabled {
            border: 1px solid #000000 !important; 
            color: #000000 !important;
            cursor: default;                 
            pointer-events: none;            
            opacity: 1 !important;           
            background-color: transparent !important;
        }

        @media screen and (max-width: 736px) {
            .project-info-grid { grid-template-columns: 1fr; } 
            .project-footer { gap: 6px; }
            .project-footer .button.small {
                font-size: 0.65rem;  
                letter-spacing: -0.02rem;
                height: 42px;
                line-height: 40px;
            }
        }
    </style> 
</head>

                <p id="project-sub">Sub-title Loading...</p>
            </section>

            <section class="project-info-grid">
                <div>
                    <div style="margin-bottom: 2rem;">
                        <span class="info-label">Role</span>
                        <p id="project-role">-</p>
                    </div>
                    <div>
                        <span class="info-label">Colors</span>
                        <div id="project-colors" class="color-palette"></div>
                    </div>
                </div>
                <div>
                    <span class="info-label">Concept</span>
                    <p id="project-concept" style="font-size: 1.1rem; line-height: 1.8;">
                        데이터를 불러오는 중입니다...
                    </p>
                </div>
            </section>

            <section id="project-images" class="project-content"></section>

            <footer class="project-footer">
                <a href="#" id="prev-btn" class="button small">← PREV</a> 
                <a href="javascript:history.back();" class="button small">LIST</a>
                <a href="#" id="next-btn" class="button small">NEXT →</a>
            </footer>
        </div>

        <div id="copyright">
            <ul><li>&copy; SONGYI DESIGN</li></ul>
        </div>
    </div>
