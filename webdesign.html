<!DOCTYPE HTML>

<head>
    <title>Web & Mobile - SONGYI DESIGN</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
        /* 프로젝트 그리드: 1단 구성으로 시원하게 */
        .project-grid {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 8rem; /* 이미지 사이의 충분한 여백 */
            margin-top: 4rem;
        }

        .project-item {
            text-align: center; /* 텍스트 중앙 정렬로 안정감 부여 */
            padding-bottom: 4rem;
            border-bottom: 1px solid #f4f4f4;
        }

        /* 이미지 컨테이너: 마우스 오버 효과 */
        .image-container {
            position: relative;
            display: block;
            overflow: hidden;
            background: #000;
            margin-bottom: 2.5rem;
        }

        .project-item img {
            width: 100%;
            height: auto;
            max-height: 700px; /* 너무 길어지지 않게 조절 */
            object-fit: cover;
            display: block;
            filter: grayscale(10%);
            transition: all 0.5s ease;
        }

        /* 호버 시 VIEW ARCHIVE 문구 */
        .hover-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.3rem;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 2;
            text-transform: uppercase;
        }

        .image-container:hover img {
            filter: grayscale(0%) opacity(0.5);
            transform: scale(1.02);
        }

        .image-container:hover .hover-text {
            opacity: 1;
        }

        .project-category {
            font-size: 0.8rem;
            letter-spacing: 0.15rem;
            color: #bbb;
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.5rem;
        }

        .project-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #222;
        }

        .project-desc {
            font-size: 1rem;
            line-height: 1.8;
            color: #666;
            max-width: 700px;
            margin: 0 auto; /* 설명글 중앙 정렬 */
        }

        @media screen and (max-width: 736px) {
            .project-grid { gap: 4rem; }
            .project-title { font-size: 1.4rem; }
        }
    </style>
</head>
